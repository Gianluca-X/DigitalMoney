spring.application.name=user-service




# Configuraci de JPA y Base de Datos
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect



# Configuracin de logs para Hibernate y Spring Security
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.core.env=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuracin de Swagger (SpringDoc)
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.rabbitmq.addresses=${RABBITMQ_URL:amqps://guest:guest@localhost:5672/}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}


jwt.secret=${JWT_SECRET}
internal.token=${INTERNAL_TOKEN}
logging.level.com.example.userservice.service.client.AuthClient=DEBUG
logging.level.feign=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG

server.port=${PORT:8080}
spring.cloud.config.enabled=false
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always