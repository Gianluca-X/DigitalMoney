spring.application.name=user-service




# Configuraci de JPA y Base de Datos
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect



# Configuracin de logs para Hibernate y Spring Security
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO

# Configuracin de Swagger (SpringDoc)
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.rabbitmq.addresses=${RABBITMQ_URL:amqps://guest:guest@localhost:5672/}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}


jwt.secret=${JWT_SECRET}
internal.token=${INTERNAL_TOKEN}
logging.level.feign=INFO

server.port=${PORT:8080}
spring.cloud.config.enabled=false
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true